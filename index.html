<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSS Industria — AI Agent & Aplikasi Siap Pakai · Industri & Healthcare</title>
  <meta name="description" content="DSS Industria — lini produk dari PT Digdaya Solusi Sistem. 9 aplikasi AI untuk industri manufaktur dan healthcare. Coba demo live atau jadwalkan konsultasi." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ── Design Tokens ───────────────────────────── */
    :root {
      --amber:       #F59E0B;
      --amber-dark:  #D97706;
      --amber-100:   #FEF3C7;
      --amber-200:   #FDE68A;
      --blue:        #2563EB;
      --blue-100:    #DBEAFE;
      --teal:        #14B8A6;
      --teal-100:    #CCFBF1;
      --green:       #22C55E;
      --navy:        #0F1B2D;
      --body:        #475569;
      --muted:       #94A3B8;
      --border:      #EAEEF5;
      --bg-white:    #FFFFFF;
      --bg-gray:     #F6F8FC;
      --bg-warm:     #FFFBF3;
      --shadow-card: 0 8px 30px rgba(15,27,45,0.06);
      --shadow-hover:0 16px 48px rgba(15,27,45,0.12);
      --font-head:   'Sora', sans-serif;
      --font-body:   'Plus Jakarta Sans', sans-serif;
      --font-mono:   'JetBrains Mono', monospace;
    }

    /* ── Reset ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      color: var(--navy);
      background: var(--bg-white);
      overflow-x: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4, h5 { font-family: var(--font-head); line-height: 1.2; }
    a { color: inherit; }
    button { font-family: var(--font-body); }

    /* ── Reveal animations ───────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1),
                  transform 0.65s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ── Badges ──────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 100px; letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .badge-live  { background: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
    .badge-demo  { background: var(--amber-100); color: #92400E; border: 1px solid var(--amber-200); }
    .badge-pilot { background: var(--teal-100); color: #134E4A; border: 1px solid #99F6E4; }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      border-radius: 10px; padding: 12px 20px;
      font-family: var(--font-body); font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none; border: none;
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      white-space: nowrap; line-height: 1;
    }
    .btn-primary {
      background: linear-gradient(135deg, #FBBF24, #F59E0B);
      color: #1C1200;
      box-shadow: 0 4px 16px rgba(245,158,11,0.28);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,158,11,0.4); }
    .btn-outline {
      background: white; color: var(--navy);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { border-color: #C4CDDA; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(15,27,45,0.06); }
    .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }

    /* ── Card base ───────────────────────────────── */
    .card {
      background: white;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.25s cubic-bezier(0.16,1,0.3,1),
                  transform   0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }

    /* ── Section label ───────────────────────────── */
    .section-label {
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber);
    }

    /* ── Cursor blink ────────────────────────────── */
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .cursor-blink { animation: cursor-blink 0.75s step-end infinite; }

    /* ── Floating WhatsApp ───────────────────────── */
    .floating-wa {
      position: fixed; bottom: 28px; right: 28px; z-index: 900;
      background: var(--amber);
      color: #1C1200;
      border-radius: 50px;
      padding: 13px 18px;
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-body); font-size: 14px; font-weight: 600;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(245,158,11,0.38);
      transition: all 0.2s ease;
    }
    .floating-wa:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(245,158,11,0.5); }
    .wa-pulse {
      width: 8px; height: 8px; border-radius: 50%; background: white; flex-shrink: 0;
      animation: wa-pulse 2s ease-in-out infinite;
    }
    @keyframes wa-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    /* ── Scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-gray); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Responsive: Desktop nav / hamburger ─────── */
    .nav-desktop { display: flex; }
    .nav-hamburger { display: none !important; }
    .nav-cta { display: inline-flex !important; }

    @media (max-width: 900px) {
      .nav-desktop   { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .nav-cta       { display: none !important; }
    }

    /* ── Responsive: Hero ────────────────────────── */
    .hero-grid { grid-template-columns: 1fr 1fr !important; }
    @media (max-width: 860px) {
      .hero-grid { grid-template-columns: 1fr !important; }
    }

    /* ── Responsive: Approach row ────────────────── */
    .approach-row { flex-direction: row; }
    @media (max-width: 700px) {
      .approach-row { flex-direction: column; gap: 12px !important; }
      .approach-row svg { transform: rotate(90deg); }
    }

    /* ── Responsive: Flagship grid ───────────────── */
    .flagship-grid { grid-template-columns: 1fr 380px !important; }
    @media (max-width: 920px) {
      .flagship-grid { grid-template-columns: 1fr !important; }
      .flagship-mockup { display: none !important; }
    }

    /* ── Responsive: Tools grid ──────────────────── */
    .tools-grid { grid-template-columns: repeat(2,1fr) !important; }
    @media (max-width: 640px) {
      .tools-grid { grid-template-columns: 1fr !important; }
    }

    /* ── Responsive: Inventory devices ──────────── */
    .inventory-grid { grid-template-columns: 1fr auto !important; }
    @media (max-width: 700px) {
      .inventory-grid { grid-template-columns: 1fr !important; }
      .inventory-devices { display: none !important; }
    }

    /* ── Responsive: HC grid ─────────────────────── */
    .hc-grid { grid-template-columns: repeat(2,1fr) !important; }
    @media (max-width: 640px) {
      .hc-grid { grid-template-columns: 1fr !important; }
    }

    /* ── Responsive: Caps grid ───────────────────── */
    .caps-grid { grid-template-columns: repeat(4,1fr) !important; }
    @media (max-width: 900px) {
      .caps-grid { grid-template-columns: repeat(2,1fr) !important; }
    }
    @media (max-width: 480px) {
      .caps-grid { grid-template-columns: 1fr 1fr !important; }
    }

    /* ── Responsive: Steps ───────────────────────── */
    .steps-grid { grid-template-columns: repeat(4,1fr) !important; }
    .steps-line { display: block; }
    @media (max-width: 700px) {
      .steps-grid { grid-template-columns: repeat(2,1fr) !important; }
      .steps-line { display: none !important; }
    }
    @media (max-width: 420px) {
      .steps-grid { grid-template-columns: 1fr !important; }
    }

    /* ── Responsive: Pricing ─────────────────────── */
    .pricing-table-wrap { display: block; }
    .pricing-row        { display: grid !important; }
    .pricing-cards-mobile { display: none !important; flex-direction: column; gap: 12px; }
    @media (max-width: 720px) {
      .pricing-table-wrap   { display: none !important; }
      .pricing-cards-mobile { display: flex !important; }
    }

    /* ── Responsive: Footer grid ─────────────────── */
    .footer-grid { grid-template-columns: 1.4fr 1fr 0.8fr 1.1fr !important; }
    @media (max-width: 860px) {
      .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 36px !important; }
    }
    @media (max-width: 480px) {
      .footer-grid { grid-template-columns: 1fr !important; }
    }

    /* ── Responsive: Floating WA ─────────────────── */
    @media (max-width: 640px) {
      .floating-wa { padding: 14px; border-radius: 50%; }
      .wa-label    { display: none; }
    }

    /* ── Misc padding at small screens ──────────── */
    @media (max-width: 600px) {
      section, footer { padding-left: 0 !important; padding-right: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data (plain JS, no Babel) -->
  <script src="dss-data.js"></script>

  <!-- Components (Babel/JSX, in dependency order) -->
  <script type="text/babel" src="dss-modal.jsx"></script>
  <script type="text/babel" src="dss-nav.jsx"></script>
  <script type="text/babel" src="dss-hero.jsx"></script>
  <script type="text/babel" src="dss-approach.jsx"></script>
  <script type="text/babel" src="dss-products-industri.jsx"></script>
  <script type="text/babel" src="dss-products-healthcare.jsx"></script>
  <script type="text/babel" src="dss-capabilities.jsx"></script>
  <script type="text/babel" src="dss-pricing.jsx"></script>
  <script type="text/babel" src="dss-footer.jsx"></script>

  <!-- App entry (mounts React) -->
  <script type="text/babel" src="dss-app.jsx"></script>
</body>
</html>
